name: Build
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: Hong-Kong-Public-Transport/Bus-Destination-Display-Processor/.github/workflows/build.yml@master
  generate:
    name: Generate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@main
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          token: ${{ steps.generate-token.outputs.token }}
      - name: Download JAR
        uses: actions/download-artifact@main
        with:
          name: Artifact
          path: build/libs
      - name: Setup JDK 21
        uses: actions/setup-java@main
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Run JAR
        run: java -jar build/libs/Bus-Destination-Display-Processor-*-all.jar "${{ secrets.BASE_URL }}" "display"
      - name: Commit and push
        shell: bash
        run: |
          git config user.name "${{ steps.generate-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add -A
          git reset build/**
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update displays"
          git push
